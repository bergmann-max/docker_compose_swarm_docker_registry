version: "3.8"

secrets:
  registry_htpasswd:
    external: true

services:
  registry:
    image: "registry:3"
    environment:
      REGISTRY_LOG_LEVEL: "info"
      REGISTRY_AUTH: "htpasswd"
      REGISTRY_AUTH_HTPASSWD_REALM: "Registry Realm"
      REGISTRY_AUTH_HTPASSWD_PATH: "/run/secrets/registry_htpasswd"
      REGISTRY_HTTP_ADDR: "0.0.0.0:5000"
      REGISTRY_HTTP_HOST: "https://registry.example.com"
    volumes:
      - "registry-data:/var/lib/registry"
    secrets:
      - source: registry_htpasswd
        target: registry_htpasswd
    networks:
      - traefik
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      labels:
        traefik.enable: "true"
        traefik.docker.network: "traefik"
        traefik.http.routers.registry.rule: "Host(`registry.example.com`)"
        traefik.http.routers.registry.entrypoints: "websecure"
        traefik.http.routers.registry.tls: "true"
        traefik.http.routers.registry.tls.certresolver: "letsencrypt"
        traefik.http.services.registry.loadbalancer.server.port: "5000"

networks:
  traefik:
    external: true
    name: "traefik"

volumes:
  registry-data:
    driver: local
    driver_opts:
      type: "nfs"
      o: "addr=storage.example.com,nfsvers=4,hard,intr"
      device: ":/var/lib/docker-volumes/registry-data"
